services:
  - type: web
    name: carbonquest-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn application:application
    envVars:
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
